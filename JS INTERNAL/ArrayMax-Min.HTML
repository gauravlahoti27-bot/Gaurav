<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <span id="demo"></span>
    <script>
    let N = [];
    for(let i=0;i<4;i++){
        var a = parseInt(prompt("Enter A Number"))
        N.push(a)
    }
    console.log(N)
    document.getElementById("demo").innerHTML = Math.max.apply(null,N)
    </script>
</body>
</html>
