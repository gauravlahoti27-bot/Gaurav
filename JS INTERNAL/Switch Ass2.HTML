<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <script>
    var a = parseInt(prompt("Enter A Number"))
    var b = parseInt(prompt("Enter A Number"))
    var c = prompt("Enter +,-,*,/")
    let Number;
    switch(c){
    case '+':
     Number = a+b;
    break;
    case '-':
     Number = a-b;
    break;
    case '*':
     Number = a*b;
    break;
    case '/':
     Number = a/c;
    break;
    case '%':
     Number = a%b;
    break;
        }
        document.write(Number);
    </script>
</body>
</html>
