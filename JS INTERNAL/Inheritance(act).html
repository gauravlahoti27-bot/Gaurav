<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <script>
        class account{
            constructor(account_no,balance){
                this.account_no = account_no
                this.balance = balance
            }
            deposit(){
                let amount = prompt("Enter amount for deposit")
                amount = Number.parseInt(amount)
                this.balance +=amount
            }
            withdraw(){
                let cash = prompt("Enter amount for withdraw")
                cash = Number.parseInt(cash)
                this.balance -= cash

            }
            check_balance(){
                alert(this.account_no+ " your account number has a balance of "+this.balance)
            }
        }  
        let gaurav = new account(1234,10000)
        gaurav.deposit()
        gaurav.withdraw()
        gaurav.check_balance()
    </script>
</body>
</html>
