<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <script>
        var a = prompt("Enter An Alphabet")
        let Alphabet;      
     switch(a){
  case "A":
  case "I":
  case "O":
  case "U":
  case "E":
    Alphabet = "Vowel";
    break;
  default:
   Alphabet  = "Consonant";
    break;
}
document.write(Alphabet)
    </script>
</body>
</html>
